<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鳳甲國中教科書驗收</title>
    <!-- 引入 Tailwind CSS 進行快速排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 html2canvas 負責將排版轉為圖片 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- 引入 jsPDF 負責產出 PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* 隱藏的 A4 樣板，用於產生 PDF (A4 比例，96 DPI 下約 794x1123) */
        .a4-template {
            width: 794px;
            height: 1123px;
            background-color: white;
            padding: 40px;
            box-sizing: border-box;
            position: absolute;
            top: -9999px;
            left: -9999px;
            font-family: "標楷體", "DFKai-sb", serif;
            color: black;
        }
        .page-title {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .grid-2x2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 20px;
            height: 900px;
        }
        .grid-2x1 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            height: 440px;
        }
        .photo-box {
            border: 1px solid #ccc;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
        }
        .photo-box img {
            max-width: 100%;
            max-height: 90%;
            object-fit: contain;
        }
        .publisher-label {
            font-size: 16px;
            margin-top: 5px;
            text-align: center;
        }
        /* Loading 遮罩 */
        #loading {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 50;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 pb-20">

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-md relative">
        <!-- 頂部導覽列 -->
        <div class="bg-blue-600 text-white p-4 sticky top-0 z-10 shadow-md">
            <h1 class="text-xl font-bold text-center">鳳甲國中 教科書驗收</h1>
            <div class="text-center text-xs text-blue-200 mt-1">版本：20260311 (雲端管理版)</div>
        </div>

        <div class="p-4 space-y-6">
            <!-- 書商選擇 -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">選擇書商：</label>
                <div class="flex gap-2">
                    <select id="publisher-select" class="flex-1 w-full border-gray-300 rounded-md shadow-sm p-3 border focus:ring-blue-500 focus:border-blue-500 bg-white">
                        <option value="康軒">康軒</option>
                        <option value="翰林">翰林</option>
                        <option value="南一">南一</option>
                        <option value="長鴻">長鴻</option>
                        <option value="真平">真平</option>
                    </select>
                    <button onclick="addNewPublisher()" class="bg-gray-100 hover:bg-gray-200 border border-gray-300 text-gray-700 font-medium py-3 px-4 rounded-md transition duration-150 flex items-center justify-center shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
                        </svg>
                        新增
                    </button>
                </div>
            </div>

            <div class="bg-yellow-50 border-l-4 border-yellow-400 p-3 text-sm text-yellow-700">
                請依序拍攝 6 張相片 (點擊框框即可拍照)。<br>
                <span class="text-xs text-yellow-600 mt-1 inline-block">系統已自動換算目前為：<span id="ui-academic-term" class="font-bold"></span></span>
            </div>

            <!-- 照片上傳區 -->
            <div class="grid grid-cols-2 gap-3" id="upload-slots">
                <!-- 由 JS 動態生成 6 個槽位 -->
            </div>

            <!-- 操作按鈕 -->
            <div class="mt-8 space-y-3">
                <button onclick="generateAndUploadPDF()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-lg flex justify-center items-center transition duration-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                    </svg>
                    產生 PDF 並上傳至雲端資料夾
                </button>
                <button onclick="downloadCloudPDFs()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg shadow-lg flex justify-center items-center transition duration-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                    檢查並下載雲端 PDF
                </button>
                <button onclick="openDeleteModal()" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-4 rounded-lg shadow-lg flex justify-center items-center transition duration-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                    管理雲端檔案 (刪除)
                </button>
                <button onclick="clearImages()" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-4 rounded-lg transition duration-200">
                    清除重拍
                </button>
                <button onclick="window.open('https://drive.google.com/drive/folders/1kY9-yKil99oLd0BvxmspnSoLCdCUBb8n?usp=sharing', '_blank')" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-lg shadow-lg flex justify-center items-center transition duration-200 mt-6">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" />
                    </svg>
                    前往雲端資料夾查看
                </button>
            </div>
        </div>
    </div>

    <!-- 刪除管理 Modal -->
    <div id="delete-modal" class="fixed inset-0 bg-black bg-opacity-70 hidden flex justify-center items-center z-50 p-4">
        <div class="bg-white rounded-lg p-6 max-w-sm w-full shadow-2xl relative">
            <h2 class="text-xl font-bold mb-4 text-red-600 flex items-center">
                <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                雲端檔案管理
            </h2>
            
            <!-- 密碼輸入區塊 -->
            <div id="delete-auth-step">
                <p class="text-sm text-gray-600 mb-2">此功能將永久刪除雲端檔案，請輸入管理員密碼：</p>
                <input type="password" id="delete-password" class="w-full border border-gray-300 rounded p-3 mb-4 focus:ring-red-500 focus:border-red-500 outline-none" placeholder="輸入密碼 (預設: 000000)">
                <div class="flex justify-end gap-2">
                    <button onclick="closeDeleteModal()" class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300">取消</button>
                    <button onclick="verifyDeletePassword()" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">驗證</button>
                </div>
            </div>

            <!-- 檔案列表區塊 -->
            <div id="delete-list-step" class="hidden">
                <p class="text-sm text-gray-600 mb-2 font-bold">點擊垃圾桶圖示永久刪除：</p>
                <div id="cloud-file-list" class="max-h-60 overflow-y-auto border rounded p-2 mb-4 space-y-2 bg-gray-50">
                    <!-- 檔案列表將在此動態生成 -->
                </div>
                <div class="flex justify-end">
                    <button onclick="closeDeleteModal()" class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300 w-full">關閉</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 載入中遮罩 -->
    <div id="loading" class="flex">
        <div class="spinner mb-4"></div>
        <div id="loading-text" class="text-lg font-bold text-center px-4">處理中，請稍候...<br><span class="text-sm font-normal text-gray-300" id="loading-sub"></span></div>
    </div>

    <!-- 隱藏的 A4 樣板 - 第一頁 -->
    <div id="pdf-page-1" class="a4-template">
        <div class="page-title">
            高雄市立鳳甲國民中學<br>
            「<span id="pdf-academic-term"></span>教科書驗收相片」
        </div>
        <div class="grid-2x2">
            <div class="photo-box"><img id="tpl-img-0" src=""><div class="publisher-label tpl-pub-name"></div></div>
            <div class="photo-box"><img id="tpl-img-1" src=""><div class="publisher-label tpl-pub-name"></div></div>
            <div class="photo-box"><img id="tpl-img-2" src=""><div class="publisher-label tpl-pub-name"></div></div>
            <div class="photo-box"><img id="tpl-img-3" src=""><div class="publisher-label tpl-pub-name"></div></div>
        </div>
    </div>

    <!-- 隱藏的 A4 樣板 - 第二頁 -->
    <div id="pdf-page-2" class="a4-template">
        <div class="grid-2x1">
            <div class="photo-box"><img id="tpl-img-4" src=""><div class="publisher-label tpl-pub-name"></div></div>
            <div class="photo-box"><img id="tpl-img-5" src=""><div class="publisher-label tpl-pub-name"></div></div>
        </div>
    </div>

    <script>
        // ★ 已經整合您專屬的 Google Apps Script 網址 ★
        const GOOGLE_APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxLaHMD45PfrLFBGAwTzElsmgiIarqJsOjbBeTItgDE0ZQydgjcPARUz6tlwFM4JJV8/exec';

        const imageState = [null, null, null, null, null, null]; // 儲存 6 張照片的 Base64
        let currentAcademicYearStr = ""; // 儲存計算出的學年度 (例如: 114)
        let currentSemesterShort = "";   // 儲存計算出的學期 (例如: 下)
        let adminPwd = ""; // 暫存通過驗證的密碼，供刪除時使用

        // 計算並設定當前學年度與學期
        function initAcademicTerm() {
            const now = new Date();
            const rocYear = now.getFullYear() - 1911; // 換算民國年
            const month = now.getMonth() + 1; // 1 ~ 12 月

            if (month >= 2 && month <= 7) {
                // 2月~7月: 算前一年的下學期
                currentAcademicYearStr = (rocYear - 1).toString();
                currentSemesterShort = "下";
            } else if (month === 1) {
                // 1月: 算前一年的上學期
                currentAcademicYearStr = (rocYear - 1).toString();
                currentSemesterShort = "上";
            } else {
                // 8月~12月: 算當年的上學期
                currentAcademicYearStr = rocYear.toString();
                currentSemesterShort = "上";
            }

            const termString = `${currentAcademicYearStr}學年度${currentSemesterShort}學期`;
            document.getElementById('ui-academic-term').textContent = termString;
            document.getElementById('pdf-academic-term').textContent = termString;
        }

        // 新增自訂書商功能
        function addNewPublisher() {
            const newPubName = prompt('請輸入新增的書商名稱：');
            if (newPubName && newPubName.trim() !== '') {
                const select = document.getElementById('publisher-select');
                const cleanName = newPubName.trim();
                let exists = false;
                for (let i = 0; i < select.options.length; i++) {
                    if (select.options[i].value === cleanName) {
                        exists = true;
                        select.selectedIndex = i;
                        break;
                    }
                }
                if (!exists) {
                    const option = document.createElement('option');
                    option.value = cleanName;
                    option.text = cleanName;
                    select.add(option);
                    select.value = cleanName;
                    saveCustomPublishers();
                }
            }
        }

        // 儲存與載入自訂書商
        function saveCustomPublishers() {
            const select = document.getElementById('publisher-select');
            const customPubs = [];
            for (let i = 5; i < select.options.length; i++) {
                customPubs.push(select.options[i].value);
            }
            localStorage.setItem('customPublishers', JSON.stringify(customPubs));
        }
        function loadCustomPublishers() {
            const saved = localStorage.getItem('customPublishers');
            if (saved) {
                const customPubs = JSON.parse(saved);
                const select = document.getElementById('publisher-select');
                customPubs.forEach(pub => {
                    const option = document.createElement('option');
                    option.value = pub;
                    option.text = pub;
                    select.add(option);
                });
            }
        }

        // 初始化上傳介面
        function initSlots() {
            const container = document.getElementById('upload-slots');
            container.innerHTML = '';
            for (let i = 0; i < 6; i++) {
                container.innerHTML += `
                    <div class="relative bg-gray-50 border-2 border-dashed border-gray-300 rounded-lg h-40 flex justify-center items-center overflow-hidden cursor-pointer hover:bg-gray-100 transition duration-150" onclick="document.getElementById('file-input-${i}').click()">
                        <div class="text-gray-400 text-center z-0" id="placeholder-${i}">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 mx-auto mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                            <span>相片 ${i + 1}</span>
                        </div>
                        <img id="preview-${i}" class="absolute inset-0 w-full h-full object-cover hidden z-10">
                        <input type="file" id="file-input-${i}" class="hidden" accept="image/*" capture="environment" onchange="handleImageSelect(event, ${i})">
                    </div>
                `;
            }
        }

        function handleImageSelect(event, index) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 1000; 
                    let width = img.width;
                    let height = img.height;
                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.7); 
                    document.getElementById(`preview-${index}`).src = dataUrl;
                    document.getElementById(`preview-${index}`).classList.remove('hidden');
                    document.getElementById(`placeholder-${index}`).classList.add('hidden');
                    imageState[index] = dataUrl;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function clearImages() {
            if(!confirm('確定要清除所有照片重新拍攝嗎？')) return;
            for(let i=0; i<6; i++) {
                imageState[i] = null;
                document.getElementById(`preview-${i}`).src = '';
                document.getElementById(`preview-${i}`).classList.add('hidden');
                document.getElementById(`placeholder-${i}`).classList.remove('hidden');
                document.getElementById(`file-input-${i}`).value = '';
            }
        }

        function blobToBase64(blob) {
            return new Promise((resolve, _) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result.split(',')[1]);
                reader.readAsDataURL(blob);
            });
        }

        // 輔助函數：將 Base64 轉回 Blob (用於單一檔案下載)
        function base64ToBlob(base64, mimeType) {
            const byteCharacters = atob(base64);
            const byteArrays = [];
            for (let offset = 0; offset < byteCharacters.length; offset += 512) {
                const slice = byteCharacters.slice(offset, offset + 512);
                const byteNumbers = new Array(slice.length);
                for (let i = 0; i < slice.length; i++) {
                    byteNumbers[i] = slice.charCodeAt(i);
                }
                const byteArray = new Uint8Array(byteNumbers);
                byteArrays.push(byteArray);
            }
            return new Blob(byteArrays, {type: mimeType});
        }

        async function buildPDFDocument() {
            const publisher = document.getElementById('publisher-select').value;
            const labels = document.querySelectorAll('.tpl-pub-name');
            labels.forEach(el => el.textContent = publisher);
            for(let i=0; i<6; i++) {
                document.getElementById(`tpl-img-${i}`).src = imageState[i];
            }
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            const page1Obj = document.getElementById('pdf-page-1');
            const canvas1 = await html2canvas(page1Obj, { scale: 2, useCORS: true });
            pdf.addImage(canvas1.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, 210, 297);
            pdf.addPage();
            const page2Obj = document.getElementById('pdf-page-2');
            const canvas2 = await html2canvas(page2Obj, { scale: 2, useCORS: true });
            pdf.addImage(canvas2.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, 210, 297);
            return { pdf, publisher };
        }

        // ==========================================
        // ★ 核心功能 1：產生並上傳 PDF 到雲端
        // ==========================================
        async function generateAndUploadPDF() {
            if (imageState.includes(null)) {
                alert('請先拍完 6 張相片再產生 PDF！');
                return;
            }
            showLoading('正在產生 PDF 排版...', '請稍候');
            try {
                const { pdf, publisher } = await buildPDFDocument();
                // ★ 這裡確保檔名包含「教科書驗收相片」
                const fileName = `${currentAcademicYearStr}${currentSemesterShort}_教科書驗收相片_${publisher}.pdf`;
                const pdfBlob = pdf.output('blob');
                
                showLoading('上傳至雲端資料夾...', '大約需要 10~20 秒');
                const base64Data = await blobToBase64(pdfBlob);

                const response = await fetch(GOOGLE_APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({
                        action: 'upload', // 指定動作
                        filename: fileName,
                        file: base64Data
                    })
                });

                const result = await response.json();
                hideLoading();

                if (result.status === 'success') {
                    alert(`上傳成功！\n【${publisher}】的驗收檔案已儲存至 Google 雲端硬碟。`);
                    for(let i=0; i<6; i++) {
                        imageState[i] = null;
                        document.getElementById(`preview-${i}`).src = '';
                        document.getElementById(`preview-${i}`).classList.add('hidden');
                        document.getElementById(`placeholder-${i}`).classList.remove('hidden');
                        document.getElementById(`file-input-${i}`).value = '';
                    }
                } else {
                    throw new Error(result.message || '伺服器回應錯誤');
                }
            } catch (error) {
                console.error(error);
                hideLoading();
                alert('發生錯誤：' + error.message);
            }
        }

        // ==========================================
        // ★ 核心功能 2：檢查並下載雲端 PDF (依序個別下載)
        // ==========================================
        async function downloadCloudPDFs() {
            showLoading('正在檢查雲端檔案...', '');
            try {
                // 1. 取得檔案列表
                const resList = await fetch(GOOGLE_APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'list' })
                });
                const dataList = await resList.json();
                
                if (dataList.status !== 'success') throw new Error(dataList.message);
                if (dataList.files.length === 0) {
                    hideLoading();
                    alert('雲端資料夾內目前沒有任何 PDF 檔案！');
                    return;
                }

                hideLoading();
                if (!confirm(`在雲端發現 ${dataList.files.length} 個 PDF 檔案，是否要下載？\n(若瀏覽器詢問是否允許多重下載，請點擊允許)`)) return;

                // 2. 嘗試使用 File System Access API (支援讓使用者先選定一個資料夾，然後全部存入)
                if (window.showDirectoryPicker) {
                    try {
                        const dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
                        for (let i = 0; i < dataList.files.length; i++) {
                            const f = dataList.files[i];
                            showLoading(`下載中 (${i+1}/${dataList.files.length})...`, f.name);
                            
                            const resDl = await fetch(GOOGLE_APPS_SCRIPT_URL, {
                                method: 'POST',
                                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                                body: JSON.stringify({ action: 'download', fileId: f.id })
                            });
                            const dlData = await resDl.json();
                            
                            const blob = base64ToBlob(dlData.fileData, 'application/pdf');
                            const fileHandle = await dirHandle.getFileHandle(f.name, { create: true });
                            const writable = await fileHandle.createWritable();
                            await writable.write(blob);
                            await writable.close();
                        }
                        hideLoading();
                        alert("全部下載完成！");
                        return; // 成功儲存則結束
                    } catch (err) {
                        // 若取消選擇目錄或瀏覽器不支援此寫入模式，則退回下方的傳統個別下載模式
                        if (err.name !== 'AbortError') console.error('Directory Picker Error:', err);
                    }
                }

                // 3. 傳統個別下載模式 (依序呼叫瀏覽器下載功能，不再打包 ZIP)
                for (let i = 0; i < dataList.files.length; i++) {
                    const f = dataList.files[i];
                    showLoading(`抓取檔案中 (${i+1}/${dataList.files.length})...`, f.name);
                    
                    const resDl = await fetch(GOOGLE_APPS_SCRIPT_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: 'download', fileId: f.id })
                    });
                    const dlData = await resDl.json();
                    const blob = base64ToBlob(dlData.fileData, 'application/pdf');

                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = f.name; // 使用雲端上原本的檔名
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    
                    // 稍微延遲避免被瀏覽器當作廣告阻擋多次連續下載
                    await new Promise(resolve => setTimeout(resolve, 500));
                }
                
                hideLoading();
                alert("已觸發所有檔案下載！");

            } catch (error) {
                console.error(error);
                hideLoading();
                alert('下載時發生錯誤：' + error.message);
            }
        }

        // ==========================================
        // ★ 核心功能 3：刪除管理 Modal 功能
        // ==========================================
        function openDeleteModal() {
            document.getElementById('delete-modal').classList.remove('hidden');
            document.getElementById('delete-auth-step').classList.remove('hidden');
            document.getElementById('delete-list-step').classList.add('hidden');
            document.getElementById('delete-password').value = '';
            adminPwd = ""; // 開啟時清空暫存密碼
        }

        function closeDeleteModal() {
            document.getElementById('delete-modal').classList.add('hidden');
        }

        async function verifyDeletePassword() {
            const pwd = document.getElementById('delete-password').value;
            if (!pwd) {
                alert('請輸入密碼！');
                return;
            }

            const btn = document.querySelector('#delete-auth-step button:last-child');
            const originalText = btn.textContent;
            btn.textContent = '驗證中...';
            btn.disabled = true;

            try {
                // 將密碼傳到 GS 後端進行驗證，並順便取得檔案列表
                const res = await fetch(GOOGLE_APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'verify_and_list', password: pwd })
                });
                const data = await res.json();
                
                if (data.status === 'success') {
                    // 驗證成功，將密碼暫存於記憶體供稍後刪除使用
                    adminPwd = pwd; 
                    document.getElementById('delete-auth-step').classList.add('hidden');
                    document.getElementById('delete-list-step').classList.remove('hidden');
                    renderCloudFilesForDelete(data.files);
                } else {
                    alert(data.message || '密碼錯誤！');
                }
            } catch(e) {
                alert('連線錯誤或後端尚未更新: ' + e.message);
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }

        // 獨立出渲染列表的功能
        function renderCloudFilesForDelete(files) {
            const listContainer = document.getElementById('cloud-file-list');
            if (files.length === 0) {
                listContainer.innerHTML = '<p class="text-center text-gray-500 py-4 text-sm">目前沒有任何檔案</p>';
                return;
            }
            listContainer.innerHTML = '';
            files.forEach(f => {
                const div = document.createElement('div');
                div.className = 'flex justify-between items-center bg-white p-2 rounded border border-gray-200 shadow-sm';
                div.innerHTML = `
                    <span class="text-sm truncate mr-2 flex-1 text-gray-700" title="${f.name}">${f.name}</span>
                    <button onclick="deleteCloudFile('${f.id}', '${f.name}')" class="text-red-500 hover:bg-red-100 p-2 rounded-full shrink-0 transition" title="刪除">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                `;
                listContainer.appendChild(div);
            });
        }

        // 刪除完成後，重新向後端要一次檔案列表 (帶上剛剛驗證過的密碼)
        async function refreshCloudFilesForDelete() {
            const listContainer = document.getElementById('cloud-file-list');
            listContainer.innerHTML = '<p class="text-center text-gray-500 py-4 text-sm">正在重新載入雲端檔案列表...</p>';
            try {
                const res = await fetch(GOOGLE_APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'verify_and_list', password: adminPwd })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    renderCloudFilesForDelete(data.files);
                } else {
                    listContainer.innerHTML = `<p class="text-red-500 text-sm">載入失敗: ${data.message}</p>`;
                }
            } catch(e) {
                listContainer.innerHTML = `<p class="text-red-500 text-sm">發生錯誤: ${e.message}</p>`;
            }
        }

        async function deleteCloudFile(id, name) {
            if (!confirm(`警告！\n\n確定要永久刪除「${name}」嗎？\n此動作將移至垃圾桶且無法復原！`)) return;
            
            showLoading('正在刪除...', name);
            try {
                // 將暫存的 adminPwd 一併傳送到後端進行雙重防護
                const res = await fetch(GOOGLE_APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'delete', fileId: id, password: adminPwd })
                });
                const data = await res.json();
                hideLoading();
                
                if (data.status === 'success') {
                    // 重新載入列表
                    await refreshCloudFilesForDelete(); 
                } else {
                    alert('刪除失敗: ' + (data.message || '請確認密碼是否正確'));
                }
            } catch(e) {
                hideLoading();
                alert('發生錯誤: ' + e.message);
            }
        }

        // UI 控制
        function showLoading(text, subtext) {
            document.getElementById('loading-text').childNodes[0].nodeValue = text;
            document.getElementById('loading-sub').textContent = subtext;
            document.getElementById('loading').style.display = 'flex';
        }
        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }

        // 啟動初始化
        window.onload = function() {
            initAcademicTerm(); 
            loadCustomPublishers(); 
            initSlots();        
        };
    </script>
</body>
