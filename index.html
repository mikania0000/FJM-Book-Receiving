<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鳳甲國中教科書驗收</title>
    <!-- 引入 Tailwind CSS 進行快速排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 html2canvas 負責將排版轉為圖片 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- 引入 jsPDF 負責產出 PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- 引入 Google Sign-In API -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        /* 隱藏的 A4 樣板，用於產生 PDF (A4 比例，96 DPI 下約 794x1123) */
        .a4-template {
            width: 794px;
            height: 1123px;
            background-color: white;
            padding: 40px;
            box-sizing: border-box;
            position: absolute;
            top: -9999px;
            left: -9999px;
            font-family: "標楷體", "DFKai-sb", serif;
            color: black;
        }
        .page-title {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .grid-2x2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 20px;
            height: 900px;
        }
        .grid-2x1 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            height: 440px;
        }
        .photo-box {
            border: 1px solid #ccc;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
        }
        .photo-box img {
            max-width: 100%;
            max-height: 90%;
            object-fit: contain;
        }
        .publisher-label {
            font-size: 16px;
            margin-top: 5px;
            text-align: center;
        }
        /* Loading 遮罩 */
        #loading {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 50;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 登入畫面樣式 */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #f3f4f6; z-index: 99999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .login-box {
            background: white; padding: 40px; border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center;
            width: 90%; max-width: 400px; border: 2px solid #e5e7eb;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 pb-20">

    <!-- 登入畫面 -->
    <div id="login-screen">
        <div class="login-box">
            <h1 class="text-2xl font-bold text-blue-600 mb-2">教科書驗收系統</h1>
            <p class="text-gray-500 mb-6 text-sm">請輸入密碼並使用 Google 帳號登入<br><span class="text-xs text-red-400">(雙重驗證)</span></p>
            
            <input type="password" id="system-auth-pwd" class="w-full border border-gray-300 rounded p-3 mb-6 focus:ring-blue-500 focus:border-blue-500 outline-none text-center shadow-sm" placeholder="1. 請先輸入系統密碼" oninput="checkPasswordInput()">
            
            <div id="google-btn-wrapper" class="opacity-50 pointer-events-none transition-opacity duration-300 relative flex flex-col items-center">
                <div class="text-sm text-gray-500 mb-3 font-bold">2. 點擊下方按鈕進行驗證</div>
                <div id="g_id_onload"
                     data-client_id="553016940521-araovlp30ctbqn6um5rr49q3es5jm4jg.apps.googleusercontent.com"
                     data-context="signin"
                     data-ux_mode="popup"
                     data-callback="handleCredentialResponse"
                     data-auto_prompt="false">
                </div>
                
                <!-- 置中對齊的登入按鈕 -->
                <div style="display: flex; justify-content: center;">
                    <div class="g_id_signin"
                         data-type="standard"
                         data-shape="rectangular"
                         data-theme="outline"
                         data-text="signin_with"
                         data-size="large"
                         data-logo_alignment="center">
                    </div>
                </div>
            </div>
            
            <div id="login-msg" class="mt-4 font-bold text-red-500 min-h-[24px]"></div>
        </div>
    </div>

    <!-- 系統主畫面 (預設隱藏) -->
    <div id="main-app" class="max-w-md mx-auto bg-white min-h-screen shadow-md relative" style="display: none;">
        <!-- 頂部導覽列 -->
        <div class="bg-blue-600 text-white p-4 sticky top-0 z-10 shadow-md relative">
            <h1 class="text-xl font-bold text-center">鳳甲國中 教科書驗收</h1>
            <div class="text-center text-xs text-blue-200 mt-1">版本：20260312 (雙重認證版)</div>
            <!-- 登出按鈕 -->
            <button onclick="logout()" class="absolute right-4 top-4 bg-red-500 hover:bg-red-600 text-white text-xs px-2 py-1 rounded transition">登出</button>
        </div>

        <div class="p-4 space-y-6">

            <div>

                    <select id="publisher-select" class="flex-1 w-full border-gray-300 rounded-md shadow-sm p-3 border focus:ring-blue-500 focus:border-blue-500 bg-white">
                        <option value="康軒">康軒</option>
                        <option value="翰林">翰林</option>
                        <option value="南一">南一</option>
                        <option value="長鴻">長鴻</option>
                        <option value="真平">真平</option>
                    </select>
                    <button onclick="addNewPublisher()" class="bg-gray-100 hover:bg-gray-200 border border-gray-300 text-gray-700 font-medium py-3 px-4 rounded-md transition duration-150 flex items-center justify-center shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
                        </svg>
                        新增
                    </button>
                </div>
            </div>

            <div class="bg-yellow-50 border-l-4 border-yellow-400 p-3 text-sm text-yellow-700">
                請依序拍攝 6 張相片 (點擊框框即可拍照)。<br>
                <span class="text-xs text-yellow-600 mt-1 inline-block">系統已自動換算目前為：<span id="ui-academic-term" class="font-bold"></span></span>
            </div>

            <!-- 照片上傳區 -->
            <div class="grid grid-cols-2 gap-3" id="upload-slots">
                <!-- 由 JS 動態生成 6 個槽位 -->
            </div>

            <!-- 操作按鈕 -->
            <div class="mt-8 space-y-3">
                <button onclick="generateAndUploadPDF()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-lg flex justify-center items-center transition duration-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                    </svg>
                    產生 PDF 並上傳至雲端資料夾
                </button>
                <button onclick="downloadCloudPDFs()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg shadow-lg flex justify-center items-center transition duration-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                    檢查並下載雲端 PDF

                <div class="grid grid-cols-2 gap-3">
                    <button onclick="openDeleteModal()" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-2 rounded-lg shadow-lg flex justify-center items-center transition duration-200">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                        檔案刪除
                    </button>
                    <!-- 帳號管理按鈕 -->
                    <button onclick="openAccountModal()" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-2 rounded-lg shadow-lg flex justify-center items-center transition duration-200">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                        </svg>
                        帳號管理
                    </button>
                </div>

                <button onclick="clearImages()" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-4 rounded-lg transition duration-200">
                    清除重拍
                </button>
                <button onclick="window.open('https://drive.google.com/drive/folders/1kY9-yKil99oLd0BvxmspnSoLCdCUBb8n?usp=sharing', '_blank')" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-lg shadow-lg flex justify-center items-center transition duration-200 mt-6">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" />
                    </svg>
                    前往雲端資料夾查看
                </button>
            </div>
        </div>
    </div>

    <!-- 刪除管理 Modal -->
    <div id="delete-modal" class="fixed inset-0 bg-black bg-opacity-70 hidden flex justify-center items-center z-50 p-4">
        <div class="bg-white rounded-lg p-6 max-w-sm w-full shadow-2xl relative">
            <h2 class="text-xl font-bold mb-4 text-red-600 flex items-center">
                <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                雲端檔案管理
            </h2>
            
            <!-- 密碼輸入區塊 -->
            <div id="delete-auth-step">
                <p class="text-sm text-gray-600 mb-2">此功能將永久刪除雲端檔案，請輸入管理員密碼：</p>
                <input type="password" id="delete-password" class="w-full border border-gray-300 rounded p-3 mb-4 focus:ring-red-500 focus:border-red-500 outline-none" placeholder="輸入密碼">
                <div class="flex justify-end gap-2">
                    <button onclick="closeDeleteModal()" class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300">取消</button>
                    <button onclick="verifyDeletePassword()" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">驗證</button>

            </div>

            <!-- 檔案列表區塊 -->
            <div id="delete-list-step" class="hidden">
                <p class="text-sm text-gray-600 mb-2 font-bold">點擊垃圾桶圖示永久刪除：</p>
                <div id="cloud-file-list" class="max-h-60 overflow-y-auto border rounded p-2 mb-4 space-y-2 bg-gray-50">
                    <!-- 檔案列表將在此動態生成 -->
                </div>
                <div class="flex gap-2">
                    <button onclick="deleteAllCloudFiles()" id="delete-all-btn" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700 w-full font-bold hidden">全部刪除</button>
                    <button onclick="closeDeleteModal()" class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300 w-full font-bold">關閉</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 帳號管理 Modal -->
    <div id="account-modal" class="fixed inset-0 bg-black bg-opacity-70 hidden flex justify-center items-center z-50 p-4">
        <div class="bg-white rounded-lg p-6 w-full max-w-lg shadow-2xl relative flex flex-col max-h-[85vh]">
            <h2 class="text-xl font-bold mb-4 text-purple-600 flex items-center">
                <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                白名單帳號管理
            </h2>
            
            <div class="flex gap-2 mb-4 shrink-0">
                <input type="text" id="new-account-email" class="flex-1 border border-gray-300 rounded p-2 focus:ring-purple-500 focus:border-purple-500 outline-none" placeholder="輸入新增的 Google 帳號">
                <button onclick="addAccount()" class="px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600 font-bold whitespace-nowrap">新增</button>
            </div>

            <div class="overflow-y-auto flex-1 border rounded bg-gray-50 p-2 space-y-2" id="account-list-container">
                <!-- 帳號列表動態生成 -->
                <p class="text-center text-gray-500 py-4 text-sm">載入中...</p>
            </div>

            <div class="mt-4 flex justify-end shrink-0">
                <button onclick="closeAccountModal()" class="px-6 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300 font-bold w-full">關閉</button>
            </div>
        </div>

    <!-- 通用自訂 Modal -->
    <div id="custom-modal" class="fixed inset-0 bg-black bg-opacity-70 hidden flex justify-center items-center z-[100] p-4">
        <div class="bg-white rounded-lg p-6 max-w-sm w-full shadow-2xl relative transform transition-all scale-100">
            <h2 id="custom-modal-title" class="text-xl font-bold mb-4 text-gray-800 flex items-center">
                提示
            </h2>
            <div id="custom-modal-message" class="text-gray-600 mb-4 whitespace-pre-line leading-relaxed"></div>
            <input type="text" id="custom-modal-input" class="hidden w-full border border-gray-300 rounded p-3 mb-4 focus:ring-blue-500 focus:border-blue-500 outline-none" placeholder="">
            <div class="flex justify-end gap-3 mt-2">
                <button id="custom-modal-cancel" class="hidden px-5 py-2.5 bg-gray-200 text-gray-700 font-medium rounded-lg hover:bg-gray-300 transition focus:outline-none">取消</button>
                <button id="custom-modal-ok" class="px-5 py-2.5 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 transition focus:outline-none shadow-sm">確定</button>
            </div>
        </div>
    </div>

    <!-- 載入中遮罩 -->
    <div id="loading" class="flex">
        <div class="spinner mb-4"></div>
        <div id="loading-text" class="text-lg font-bold text-center px-4">處理中，請稍候...<br><span class="text-sm font-normal text-gray-300" id="loading-sub"></span></div>
    </div>

    <!-- 隱藏的 A4 樣板 - 第一頁 -->
    <div id="pdf-page-1" class="a4-template">
        <div class="page-title">
            高雄市立鳳甲國民中學<br>
            「<span id="pdf-academic-term"></span>教科書驗收相片」
        </div>
        <div class="grid-2x2">
            <div class="photo-box"><img id="tpl-img-0" src=""><div class="publisher-label tpl-pub-name"></div></div>
            <div class="photo-box"><img id="tpl-img-1" src=""><div class="publisher-label tpl-pub-name"></div></div>
            <div class="photo-box"><img id="tpl-img-2" src=""><div class="publisher-label tpl-pub-name"></div></div>
            <div class="photo-box"><img id="tpl-img-3" src=""><div class="publisher-label tpl-pub-name"></div></div>
        </div>
    </div>

    <!-- 隱藏的 A4 樣板 - 第二頁 -->
    <div id="pdf-page-2" class="a4-template">
        <div class="grid-2x1">
            <div class="photo-box"><img id="tpl-img-4" src=""><div class="publisher-label tpl-pub-name"></div></div>
            <div class="photo-box"><img id="tpl-img-5" src=""><div class="publisher-label tpl-pub-name"></div></div>
        </div>
    </div>

    <script>
        // ★ 請確認此處為您 Google Apps Script 最新的網頁應用程式 URL ★
        const GOOGLE_APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxLaHMD45PfrLFBGAwTzElsmgiIarqJsOjbBeTItgDE0ZQydgjcPARUz6tlwFM4JJV8/exec';

        // ---------------- 登入與雙重認證機制 ----------------
        function checkPasswordInput() {
            const pwd = document.getElementById('system-auth-pwd').value;
            const wrapper = document.getElementById('google-btn-wrapper');
            const msgEl = document.getElementById('login-msg');
            if (pwd.length > 0) {
                wrapper.classList.remove('opacity-50', 'pointer-events-none');
                if (msgEl.textContent === "請先輸入系統認證密碼！") {
                    msgEl.textContent = "";
                }
            } else {
                wrapper.classList.add('opacity-50', 'pointer-events-none');
            }
        }

        function decodeJwtResponse(token) {
            try {
                let base64Url = token.split('.')[1];
                let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                let jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch (e) {
                return null;
            }
        }

        // 處理 Google 回傳的 Credential 並同時送出密碼驗證
        async function handleCredentialResponse(response) {
            const pwd = document.getElementById('system-auth-pwd').value;
            const msgEl = document.getElementById('login-msg');

            if (!pwd) {
                msgEl.textContent = "請先輸入系統認證密碼！";
                msgEl.className = "mt-4 font-bold text-red-500 min-h-[24px]";
                return;
            }

            const payload = decodeJwtResponse(response.credential);
            if (!payload || !payload.email) return;
            const email = payload.email;

            msgEl.textContent = "雲端驗證雙重授權中...";
            msgEl.className = "mt-4 font-bold text-blue-500 min-h-[24px]";

            try {
                const res = await fetch(GOOGLE_APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ 
                        action: 'login_with_password', 
                        email: email,
                        password: pwd
                    })
                });
                const data = await res.json();
                
                if (data.status === 'success') {
                    if (data.authorized) {
                        // 雙重驗證皆通過！寫入 LocalStorage 記住登入狀態 (只存 Email)
                        localStorage.setItem('authEmailBookApp', email);
                        startApp(email);
                    } else {
                        // 密碼對了，但 Email 不在白名單
                        msgEl.textContent = `❌ 帳號 ${email} 未在授權白名單內`;
                        msgEl.className = "mt-4 font-bold text-red-500 min-h-[24px]";
                    }
                } else {
                    // 後端回傳錯誤 (通常是密碼錯誤)
                    msgEl.textContent = `⚠️ 拒絕登入: ${data.message}`;
                    msgEl.className = "mt-4 font-bold text-red-500 min-h-[24px]";
                }
            } catch (err) {
                msgEl.textContent = "連線驗證失敗，請檢查網路狀態";
                msgEl.className = "mt-4 font-bold text-red-500 min-h-[24px]";
            }
        }

        // 網頁重新整理時的背景驗證 (檢查 localStorage 是否存在，並確認仍存在於白名單)
        function checkLoginStatus() {
            const savedEmail = localStorage.getItem('authEmailBookApp');
            if (savedEmail) {
                // 已有記憶，先隱藏登入並顯示主畫面
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                
                // 背景再確認一次，防止名單被刪除後仍能進入 (不需要再傳密碼，因為已經取得 session 信任)
                fetch(GOOGLE_APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'verifyLogin', email: savedEmail })
                })
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'success' && !data.authorized) {
                        alert("您的帳號已被管理員移出白名單，請重新登入！");
                        logout();
                    }
                }).catch(e => console.log('背景驗證中斷'));

                startApp(savedEmail);
            } else {
                // 無記憶，確保顯示登入畫面
                document.getElementById('login-screen').style.display = 'flex';

        function showCustomModal({ title, message, type = 'alert' }) {
            return new Promise((resolve) => {
                const modal = document.getElementById('custom-modal');
                const titleEl = document.getElementById('custom-modal-title');
                const msgEl = document.getElementById('custom-modal-message');
                const inputEl = document.getElementById('custom-modal-input');
                const cancelBtn = document.getElementById('custom-modal-cancel');
                const okBtn = document.getElementById('custom-modal-ok');

                titleEl.textContent = title || '提示';
                msgEl.textContent = message;

                inputEl.classList.add('hidden');
                inputEl.value = '';
                cancelBtn.classList.add('hidden');
                
                if (title && (title.includes('警告') || title.includes('錯誤') || title.includes('失敗'))) {
                    okBtn.className = 'px-5 py-2.5 bg-red-600 text-white font-medium rounded-lg hover:bg-red-700 transition focus:outline-none shadow-sm';
                    titleEl.className = 'text-xl font-bold mb-4 text-red-600 flex items-center';
                } else {
                    okBtn.className = 'px-5 py-2.5 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 transition focus:outline-none shadow-sm';
                    titleEl.className = 'text-xl font-bold mb-4 text-gray-800 flex items-center';
                }
                
                if (type === 'prompt') {
                    inputEl.classList.remove('hidden');
                    cancelBtn.classList.remove('hidden');
                    setTimeout(() => inputEl.focus(), 100);
                } else if (type === 'confirm') {
                    cancelBtn.classList.remove('hidden');
                }

                modal.classList.remove('hidden');

                const cleanup = () => {
                    modal.classList.add('hidden');
                    okBtn.onclick = null;
                    cancelBtn.onclick = null;
                };

                okBtn.onclick = () => {
                    cleanup();
                    resolve(type === 'prompt' ? inputEl.value : true);
                };

                cancelBtn.onclick = () => {
                    cleanup();
                    resolve(type === 'prompt' ? null : false);
                };
            });
        }

        function handleImageSelect(event, index) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 1000; 
                    let width = img.width;
                    let height = img.height;
                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.7); 
                    document.getElementById(`preview-${index}`).src = dataUrl;
                    document.getElementById(`preview-${index}`).classList.remove('hidden');
                    document.getElementById(`placeholder-${index}`).classList.add('hidden');
                    imageState[index] = dataUrl;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function blobToBase64(blob) {
            return new Promise((resolve, _) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result.split(',')[1]);
                reader.readAsDataURL(blob);
            });
        }

        function base64ToBlob(base64, mimeType) {
            const byteCharacters = atob(base64);
            const byteArrays = [];
            for (let offset = 0; offset < byteCharacters.length; offset += 512) {
                const slice = byteCharacters.slice(offset, offset + 512);
                const byteNumbers = new Array(slice.length);
                for (let i = 0; i < slice.length; i++) {
                    byteNumbers[i] = slice.charCodeAt(i);
                }
                const byteArray = new Uint8Array(byteNumbers);
                byteArrays.push(byteArray);
            }
            return new Blob(byteArrays, {type: mimeType});
        }

        async function downloadCloudPDFs() {
            showLoading('正在檢查雲端檔案...', '');
            try {
                const resList = await fetch(GOOGLE_APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'list' })
                });
                const dataList = await resList.json();
                
                if (dataList.status !== 'success') throw new Error(dataList.message);
                if (dataList.files.length === 0) {
                    hideLoading();
                    await customAlert('雲端資料夾內目前沒有任何 PDF 檔案！', '無檔案');
                    return;
                }

                hideLoading();
                if (!(await customConfirm(`在雲端發現 ${dataList.files.length} 個 PDF 檔案，是否要下載？\n(若瀏覽器詢問是否允許多重下載，請點擊允許)`, '下載確認'))) return;

                if (window.showDirectoryPicker) {
                    try {
                        const dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
                        for (let i = 0; i < dataList.files.length; i++) {
                            const f = dataList.files[i];
                            showLoading(`下載中 (${i+1}/${dataList.files.length})...`, f.name);
                            
                            const resDl = await fetch(GOOGLE_APPS_SCRIPT_URL, {
                                method: 'POST',
                                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                                body: JSON.stringify({ action: 'download', fileId: f.id })
                            });
                            const dlData = await resDl.json();
                            
                            const blob = base64ToBlob(dlData.fileData, 'application/pdf');
                            const fileHandle = await dirHandle.getFileHandle(f.name, { create: true });
                            const writable = await fileHandle.createWritable();
                            await writable.write(blob);
                            await writable.close();
                        }
                        hideLoading();
                        await customAlert("全部下載完成！", '下載成功');
                        return; 
                    } catch (err) {
                        if (err.name !== 'AbortError') console.error('Directory Picker Error:', err);
                    }
                }

                for (let i = 0; i < dataList.files.length; i++) {
                    const f = dataList.files[i];
                    showLoading(`抓取檔案中 (${i+1}/${dataList.files.length})...`, f.name);
                    
                    const resDl = await fetch(GOOGLE_APPS_SCRIPT_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: 'download', fileId: f.id })
                    });
                    const dlData = await resDl.json();
                    const blob = base64ToBlob(dlData.fileData, 'application/pdf');

                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = f.name; 
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    
                    await new Promise(resolve => setTimeout(resolve, 500));
                }
                
                hideLoading();
                await customAlert("已觸發所有檔案下載！", '下載成功');

            } catch (error) {
                console.error(error);
                hideLoading();
                await customAlert('下載時發生錯誤：' + error.message, '錯誤');
            }
        }

            showLoading('正在刪除...', name);
            try {
                const res = await fetch(GOOGLE_APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'delete', fileId: id, password: adminPwd })
                });
                const data = await res.json();
                hideLoading();
                
                if (data.status === 'success') {
                    await refreshCloudFilesForDelete(); 
                } else {
                    await customAlert('刪除失敗: ' + (data.message || '請確認密碼是否正確'), '錯誤');
                }
            } catch(e) {
                hideLoading();
                await customAlert('發生錯誤: ' + e.message, '錯誤');
            }
        }

        async function deleteAllCloudFiles() {
            if (!currentCloudFiles || currentCloudFiles.length === 0) return;
            if (!(await customConfirm(`警告！\n\n確定要永久刪除雲端上的這 ${currentCloudFiles.length} 個檔案嗎？\n此動作將移至垃圾桶且無法復原！`, '全部刪除確認'))) return;

            showLoading('正在全部刪除...', '請稍候，勿關閉視窗');
            try {
                let successCount = 0;
                let failCount = 0;

                for (let i = 0; i < currentCloudFiles.length; i++) {
                    const f = currentCloudFiles[i];
                    showLoading(`正在刪除 (${i+1}/${currentCloudFiles.length})...`, f.name);
                    
                    const res = await fetch(GOOGLE_APPS_SCRIPT_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: 'delete', fileId: f.id, password: adminPwd })
                    });
                    const data = await res.json();
                    
                    if (data.status === 'success') {
                        successCount++;
                    } else {
                        failCount++;
                    }
                }

                hideLoading();
                if (failCount === 0) {
                    await customAlert(`成功刪除全部 ${successCount} 個檔案！`, '刪除完成');
                } else {
                    await customAlert(`刪除作業結束。\n成功: ${successCount} 個\n失敗: ${failCount} 個`, '刪除完成 (含失敗)');
                }
                await refreshCloudFilesForDelete(); 
            } catch(e) {
                hideLoading();
                await customAlert('發生錯誤: ' + e.message, '錯誤');
            }
        }

        function showLoading(text, subtext) {
            document.getElementById('loading-text').childNodes[0].nodeValue = text;
            document.getElementById('loading-sub').textContent = subtext;
            document.getElementById('loading').style.display = 'flex';
        }
        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }

        // 頁面載入時檢查登入狀態
        window.onload = function() {
            checkLoginStatus();
        };
    </script>
</body>
</html>
